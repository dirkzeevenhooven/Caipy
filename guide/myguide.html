<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/guide/guard.js"></script>
  <script>var GUIDE_PAGE = 'myguide';</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Guide · Planet Curated Cape Town</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/guide/sidebar.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Brand */
      --ocean: #1B3A4B; --ocean-dark: #122535; --gold: #C9A96E; --gold-light: #e0c48a;
      --gold-dark: #9A7228;
      /* Light content surface */
      --page-bg: #F3EDE0;
      --card-bg: #FFFFFF;
      --card-alt: #FAF7F1;
      --border: rgba(27,58,75,0.1);
      --border-gold: rgba(201,169,110,0.3);
      --ink: #1B3A4B;
      --ink-mid: rgba(27,58,75,0.68);
      --ink-faint: rgba(27,58,75,0.42);
      /* Legacy — keep for any residual references */
      --white: #FAF8F4; --white-dim: rgba(250,248,244,0.78); --white-faint: rgba(250,248,244,0.55);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--page-bg); color: var(--ink); overflow-x: hidden; }

    /* PAGE HEADER — dark navy band */
    .page-header {
      padding: 24px 0 22px;
      background: var(--ocean-dark);
      border-bottom: 3px solid var(--gold);
    }
    .mg-header-flex { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .page-header-left {}
    .eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(201,169,110,0.75); margin-bottom: 6px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 2.5vw, 32px); font-weight: 300; line-height: 1.1; color: var(--white); }
    .page-header h1 em { font-style: italic; color: var(--gold); }

    /* 4 DASHBOARD CARDS */
    .dash-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 24px 0 0; }
    .dash-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(27,58,75,0.06);
    }
    .dash-card-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; margin-bottom: 10px; }
    .dash-card-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .dash-card-sub { font-size: 11px; color: var(--ink-mid); margin-bottom: 10px; }
    .dash-card-bar { height: 4px; border-radius: 4px; background: rgba(27,58,75,0.08); overflow: hidden; }
    .dash-card-bar-fill { height: 100%; border-radius: 4px; background: var(--gold); transition: width 0.7s ease; }
    .dash-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; }
    .dash-status.pending { color: var(--gold-dark); }
    .dash-status.ready { color: #3A7A4B; }
    .dash-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dash-status-dot.pending { background: var(--gold); }
    .dash-status-dot.ready { background: #4A9B5F; }

    /* COCKPIT */
    .cockpit { padding: 0 0 100px; }

    .section {
      padding: 36px 0;
      border-bottom: 1px solid rgba(27,58,75,0.08);
    }
    .section:last-of-type { border-bottom: none; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: var(--ink); }
    .section-title em { font-style: italic; color: var(--gold-dark); }
    .section-link { font-size: 12px; color: var(--gold-dark); text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; }
    .section-link:hover { color: var(--gold); }

    /* ── STAT CARDS ── */
    .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 16px;
      box-shadow: 0 1px 3px rgba(27,58,75,0.05);
    }
    .stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 6px; font-weight: 600; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--ink); line-height: 1.2; }
    .stat-value.small { font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 500; }
    .stat-unit { font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink-mid); }

    /* ── STYLE PILLS ── */
    .style-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .style-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 22px; flex: 1; min-width: 160px;
      box-shadow: 0 1px 3px rgba(27,58,75,0.05);
    }
    .style-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 6px; font-weight: 600; }
    .style-value { font-size: 13px; color: var(--ink); line-height: 1.5; }

    /* ── INTEREST TAGS ── */
    .interest-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .interest-tag {
      padding: 7px 16px; border-radius: 40px; font-size: 12px;
      border: 1px solid var(--border-gold); color: var(--gold-dark);
      background: rgba(201,169,110,0.1);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      background: var(--card-alt); border: 1px dashed rgba(27,58,75,0.12);
      border-radius: 12px; padding: 40px 36px; text-align: center;
    }
    .empty-icon { font-size: 28px; margin-bottom: 14px; opacity: 0.45; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--ink); margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: var(--ink-mid); line-height: 1.6; margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
    .empty-link { display: inline-block; font-size: 12px; color: var(--gold-dark); text-decoration: none; letter-spacing: 0.5px; border: 1px solid var(--border-gold); padding: 8px 20px; border-radius: 20px; transition: all 0.2s; }
    .empty-link:hover { background: rgba(201,169,110,0.1); }

    /* ── PLACEHOLDER BOX ── */
    .placeholder-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 22px 26px; }
    .placeholder-box p { font-size: 13px; color: var(--ink-mid); line-height: 1.7; }

    /* ── SAFETY NOTES ── */
    .safety-list { list-style: none; display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card-bg); }
    .safety-item { display: flex; align-items: flex-start; gap: 14px; padding: 15px 20px; border-bottom: 1px solid var(--border); }
    .safety-item:last-child { border-bottom: none; }
    .safety-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
    .safety-text strong { font-size: 13px; color: var(--ink); display: block; margin-bottom: 2px; }
    .safety-text span { font-size: 12px; color: var(--ink-mid); line-height: 1.6; }

    /* ── ASK UBUNTU CTA ── */
    .ubuntu-cta {
      background: var(--ocean-dark); border-radius: 16px; padding: 40px 48px;
      display: flex; flex-direction: column; gap: 28px;
    }
    .ubuntu-cta-text .cta-eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(201,169,110,0.8); margin-bottom: 8px; }
    .ubuntu-cta-text h3 { font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 2.2vw, 30px); font-weight: 300; line-height: 1.2; margin-bottom: 8px; color: var(--white); }
    .ubuntu-cta-text h3 em { font-style: italic; color: var(--gold); }
    .ubuntu-cta-text p { font-size: 13px; color: var(--white-dim); line-height: 1.7; max-width: 480px; }
    /* Chat panel */
    .ubuntu-chat-panel { display: flex; flex-direction: column; gap: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; }
    .ubuntu-chat-history { min-height: 260px; max-height: 420px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: rgba(0,0,0,0.18); scroll-behavior: smooth; }
    .ubuntu-chat-history::-webkit-scrollbar { width: 4px; }
    .ubuntu-chat-history::-webkit-scrollbar-track { background: transparent; }
    .ubuntu-chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .ubuntu-msg { display: flex; gap: 10px; align-items: flex-start; max-width: 86%; }
    .ubuntu-msg--ubuntu { align-self: flex-start; }
    .ubuntu-msg--user { align-self: flex-end; flex-direction: row-reverse; }
    .ubuntu-msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--gold); font-family: 'Cormorant Garamond', serif; }
    .ubuntu-msg-bubble { padding: 11px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
    .ubuntu-msg--ubuntu .ubuntu-msg-bubble { background: rgba(255,255,255,0.08); color: var(--white-dim); border-radius: 4px 12px 12px 12px; }
    .ubuntu-msg--user .ubuntu-msg-bubble { background: rgba(201,169,110,0.18); color: var(--white); border-radius: 12px 4px 12px 12px; border: 1px solid rgba(201,169,110,0.25); }
    .ubuntu-typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: rgba(250,248,244,0.5); margin: 0 2px; animation: ubuntuBlink 1.2s infinite; }
    .ubuntu-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .ubuntu-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ubuntuBlink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* Chips + input */
    .ubuntu-chat-bottom { background: rgba(0,0,0,0.12); padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .ubuntu-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .ubuntu-chip { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.13); border-radius: 20px; padding: 6px 14px; font-size: 11.5px; color: rgba(250,248,244,0.7); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.18s; }
    .ubuntu-chip:hover { background: rgba(201,169,110,0.12); border-color: rgba(201,169,110,0.4); color: var(--gold); }
    .ubuntu-input-row { display: flex; gap: 10px; align-items: stretch; }
    .ubuntu-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 12px 16px; font-size: 13px; color: var(--white); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .ubuntu-input::placeholder { color: rgba(250,248,244,0.38); }
    .ubuntu-input:focus { border-color: rgba(201,169,110,0.5); }

    .btn-cta { display: inline-block; background: var(--gold); color: var(--ocean-dark); padding: 13px 32px; border-radius: 6px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; transition: all 0.2s; white-space: nowrap; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-cta:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* ── RESEND SECONDARY ── */
    .resend-secondary { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); text-align: center; }
    .resend-secondary-title { font-size: 13px; color: var(--ink-mid); margin-bottom: 14px; }
    .resend-row { display: flex; gap: 10px; max-width: 400px; margin: 0 auto; }
    .email-input { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; color: var(--ink); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .email-input::placeholder { color: var(--ink-faint); }
    .email-input:focus { border-color: var(--gold); }
    .resend-btn { background: transparent; border: 1px solid var(--border-gold); color: var(--gold-dark); padding: 11px 20px; border-radius: 8px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; white-space: nowrap; }
    .resend-btn:hover { background: rgba(201,169,110,0.1); }
    #resendMsg { font-size: 12px; margin-top: 10px; min-height: 16px; color: var(--ink-mid); }

    /* ── NO PROFILE ── */
    .no-profile-wrap { padding: 80px 60px; text-align: center; max-width: 560px; margin: 0 auto; }
    .no-profile-icon { font-size: 48px; margin-bottom: 22px; opacity: 0.45; }
    .no-profile-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(30px, 3.5vw, 44px); font-weight: 300; line-height: 1.15; margin-bottom: 14px; color: var(--ink); }
    .no-profile-title em { font-style: italic; color: var(--gold-dark); }
    .no-profile-sub { font-size: 15px; color: var(--ink-mid); line-height: 1.8; margin-bottom: 36px; }
    .no-profile-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--gold); color: var(--ocean-dark); padding: 16px 44px; border-radius: 8px; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: all 0.25s; }
    .no-profile-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 10px 36px rgba(201,169,110,0.25); }

    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
      .dash-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .page-header { padding: 20px 0; }
      .cockpit { padding: 0 0 60px; }
      .dash-row { padding: 16px 0 0; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .ubuntu-cta { padding: 24px 20px; }

      .ubuntu-chat-history { min-height: 220px; max-height: 320px; }
      .resend-row { flex-direction: column; }
      .no-profile-wrap { padding: 60px 24px; }
    }

    /* ── RECOMMENDATION CARDS (image-first) ── */
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .rec-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 12px rgba(27,58,75,0.07); transition: box-shadow 0.2s, transform 0.2s; }
    .rec-card:hover { box-shadow: 0 6px 24px rgba(27,58,75,0.12); transform: translateY(-2px); }
    .rc-img-wrap { position: relative; height: 192px; overflow: hidden; background: linear-gradient(135deg, #e8e0d0, #d0c8b6); flex-shrink: 0; }
    .rc-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rc-img-placeholder { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; font-size: 36px; }
    .rc-img-wrap--fallback .rc-img-placeholder { display: flex; }
    .rc-body { padding: 18px 18px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .rc-cat { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dark); font-weight: 600; }
    .rc-name { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 400; color: var(--ink); line-height: 1.2; }
    .rc-teaser { font-size: 12px; color: var(--ink-mid); line-height: 1.6; font-style: italic; }
    .rc-meta { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
    .rc-tip { margin-top: 2px; }
    .rc-tip-toggle { background: none; border: none; padding: 0; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold-dark); cursor: pointer; font-family: Inter, sans-serif; font-weight: 600; }
    .rc-tip-body { font-size: 12px; color: var(--ink-mid); line-height: 1.65; margin-top: 6px; padding: 10px 12px; background: rgba(201,169,110,0.08); border-left: 2px solid rgba(201,169,110,0.45); border-radius: 0 6px 6px 0; }
    .rc-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 12px; }
    .rc-btn-primary { flex: 1; padding: 10px 16px; background: var(--ocean); color: #FAF8F4; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: Inter, sans-serif; transition: background 0.2s; text-align: center; white-space: nowrap; min-width: 0; }
    .rc-btn-primary:hover { background: var(--ocean-dark); }
    .rc-btn-primary.saved { background: rgba(27,58,75,0.12); color: var(--ink-faint); cursor: default; }
    .rc-btn-secondary { display: inline-flex; align-items: center; padding: 10px 14px; background: transparent; border: 1px solid var(--border-gold); color: var(--gold-dark); border-radius: 8px; font-size: 12px; font-weight: 500; text-decoration: none; transition: all 0.2s; white-space: nowrap; font-family: Inter, sans-serif; }
    .rc-btn-secondary:hover { background: rgba(201,169,110,0.08); }
    .rec-subsection { margin-bottom: 36px; }
    .rec-subsection-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 16px; font-weight: 600; }
    .rec-loading { text-align: center; padding: 40px 0; }
    .rec-error { font-size: 13px; color: var(--ink-mid); line-height: 1.7; padding: 28px; background: var(--card-alt); border: 1px dashed var(--border); border-radius: 10px; text-align: center; }

    /* ── PERSONALISED ITINERARY CARDS ── */
    .pi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .pi-card { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,.5); min-height: 380px; display: flex; flex-direction: column; justify-content: flex-end; cursor: pointer; }
    .pi-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: transform .6s ease; }
    .pi-card:hover .pi-photo { transform: scale(1.04); }
    .pi-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(13,27,42,0.0) 0%, rgba(13,27,42,0.72) 50%); z-index: 1; }
    .pi-day { position: relative; z-index: 2; padding: 24px 24px 8px; }
    .pi-day-num { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .pi-day-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--white); }
    .pi-body { position: relative; z-index: 2; padding: 12px 24px 14px; display: flex; flex-direction: column; gap: 10px; }
    .pi-item { display: flex; gap: 12px; align-items: flex-start; }
    .pi-time { font-size: 10px; font-weight: 500; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; margin-top: 3px; min-width: 64px; }
    .pi-item p { font-size: 13px; color: rgba(250,248,244,0.82); line-height: 1.6; font-weight: 300; }
    .pi-item strong { color: var(--white); font-weight: 500; }
    .pi-hint { position: relative; z-index: 2; display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 0 24px 16px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(201,169,110,0.6); transition: color 0.2s; }
    .pi-card:hover .pi-hint { color: rgba(201,169,110,0.95); }
    .pi-hint-arrow { font-size: 14px; transition: transform 0.25s; }
    .pi-card:hover .pi-hint-arrow { transform: translateY(-2px); }
    .pi-card--final { grid-column: 1 / -1; min-height: 300px; }

    /* ── PERSONALISED DAY MODAL ── */
    .pi-modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(10,20,32,0.82); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 24px; }
    .pi-modal-overlay.open { opacity: 1; pointer-events: all; }
    .pi-modal { background: #0F2430; border: 1px solid rgba(201,169,110,0.25); border-radius: 16px; max-width: 760px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; transform: translateY(24px) scale(0.97); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .pi-modal-overlay.open .pi-modal { transform: translateY(0) scale(1); }
    .pi-modal-photo { width: 100%; height: 240px; object-fit: cover; border-radius: 16px 16px 0 0; }
    .pi-modal-body { padding: 36px 40px 40px; }
    .pi-modal-eyebrow { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .pi-modal-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; margin-bottom: 24px; line-height: 1.1; }
    .pi-modal-title em { font-style: italic; color: var(--gold); }
    .pi-modal-schedule { display: flex; flex-direction: column; gap: 0; border: 1px solid rgba(201,169,110,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
    .pi-modal-slot { display: flex; gap: 20px; padding: 18px 22px; border-bottom: 1px solid rgba(201,169,110,0.07); }
    .pi-modal-slot:last-child { border-bottom: none; }
    .pi-modal-time { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); white-space: nowrap; margin-top: 3px; min-width: 72px; font-weight: 500; }

<div class="main" id="mainContent" data-guide-start="true">

<script>
// ─── Helpers ─────────────────────────────────────────────
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(str) {
  if (!str) return '—';
  var d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ─── Personalised itinerary rendering ────────────────────
var piDaysData = [];

function renderPersonalisedItinerary(days) {
  piDaysData = days;
  var fallbackImgs = [
    '/photos/sea-point.jpeg', '/photos/table-mountain.jpeg', '/photos/Cape-Point.webp',
    '/photos/winelands.webp', '/photos/waterfront.jpeg', '/photos/hero-aerial.jpg'
  ];
  var html = '<div class="pi-grid">';
  days.forEach(function(d, i) {
    var isLast = i === days.length - 1 && days.length > 1;
    var cardClass = 'pi-card' + (isLast ? ' pi-card--final' : '');
    var img = d.image || fallbackImgs[i % fallbackImgs.length];
    var label = d.label || ('Day ' + d.dayNumber);
    var previewSlots = [];
    if (d.morning) previewSlots.push({ time: 'Morning', text: d.morning });
    if (d.afternoon) previewSlots.push({ time: 'Afternoon', text: d.afternoon });
    if (d.evening) previewSlots.push({ time: 'Evening', text: d.evening });
    var previewHtml = previewSlots.slice(0, 3).map(function(s) {
      return '<div class="pi-item"><div class="pi-time">' + escHtml(s.time) + '</div><p>' + escHtml(s.text) + '</p></div>';
    }).join('');
    html += '<div class="' + cardClass + '" onclick="openPiDay(' + i + ')">' +
      '<img class="pi-photo" src="' + escHtml(img) + '" alt="' + escHtml(label) + '">' +
      '<div class="pi-overlay"></div>' +
      '<div class="pi-day">' +
        '<div class="pi-day-num">' + escHtml(label) + '</div>' +
        '<div class="pi-day-title">' + escHtml(d.title || d.area || '') + '</div>' +
      '</div>' +
      '<div class="pi-body">' + previewHtml + '</div>' +
      '<div class="pi-hint"><span>Expand day</span><span class="pi-hint-arrow">↑</span></div>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function openPiDay(n) {
  var d = piDaysData[n];
  if (!d) return;
  var fallbackImgs = ['/photos/sea-point.jpeg', '/photos/table-mountain.jpeg', '/photos/Cape-Point.webp', '/photos/winelands.webp', '/photos/waterfront.jpeg', '/photos/hero-aerial.jpg'];
  var img = d.image || fallbackImgs[n % fallbackImgs.length];
  document.getElementById('piModalPhoto').src = img;
  document.getElementById('piModalPhoto').alt = d.title || '';
  document.getElementById('piModalEyebrow').textContent = d.label || ('Day ' + d.dayNumber);
  document.getElementById('piModalTitle').textContent = d.title || d.area || '';

  var slots = [];
  if (Array.isArray(d.slots)) {
    slots = d.slots;
  } else {
    if (d.morning) slots.push({ time: 'Morning', text: d.morning });
    if (d.afternoon) slots.push({ time: 'Afternoon', text: d.afternoon });
    if (d.evening) slots.push({ time: 'Evening', text: d.evening });
  }
  document.getElementById('piModalSchedule').innerHTML = slots.map(function(s) {
    return '<div class="pi-modal-slot"><div class="pi-modal-time">' + escHtml(s.time) + '</div><p>' + escHtml(s.text || s.html || '') + '</p></div>';
  }).join('');

  var metaHtml = '';
  if (d.estimatedCost) metaHtml += '<div class="pi-modal-meta-item"><div class="pi-modal-meta-label">Est. Cost</div><div class="pi-modal-meta-val">' + escHtml(d.estimatedCost) + '</div></div>';
  if (d.transport) metaHtml += '<div class="pi-modal-meta-item"><div class="pi-modal-meta-label">Getting Around</div><div class="pi-modal-meta-val">' + escHtml(d.transport) + '</div></div>';
  if (Array.isArray(d.restaurants) && d.restaurants.length) metaHtml += '<div class="pi-modal-meta-item"><div class="pi-modal-meta-label">Eat & Drink</div><div class="pi-modal-meta-val">' + d.restaurants.map(escHtml).join(' &middot; ') + '</div></div>';
  if (d.planB) metaHtml += '<div class="pi-modal-meta-item"><div class="pi-modal-meta-label">Plan B</div><div class="pi-modal-meta-val">' + escHtml(d.planB) + '</div></div>';
  var metaEl = document.getElementById('piModalMeta');
  metaEl.innerHTML = metaHtml;
  metaEl.style.display = metaHtml ? '' : 'none';

  var tipContent = d.safetyNote || d.tip || '';
  var tipLabel = d.safetyNote ? 'Safety Note' : 'Insider Tip';
  var tipEl = document.getElementById('piModalTip');
  tipEl.innerHTML = tipContent ? '<div class="pi-modal-tip-label">' + tipLabel + '</div><p>' + escHtml(tipContent) + '</p>' : '';
  tipEl.style.display = tipContent ? '' : 'none';

  document.getElementById('piModalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('piModal').scrollTop = 0;
}

function closePiDay() {
  document.getElementById('piModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handlePiOverlayClick(e) {
  if (e.target === document.getElementById('piModalOverlay')) closePiDay();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePiDay();
});

// ─── MVP Itinerary builder ───────────────────────────────
function buildMvpItinerary(p) {
  var places = Array.isArray(p.savedPlaces) ? p.savedPlaces : [];
  var numDays = Math.min(parseInt(p.days, 10) || 5, 5);

  var stay    = places.find(function(pl) { return pl.category === 'Accommodation'; });
  var car     = places.find(function(pl) { return pl.category === 'Rental Car'; });
  var exps    = places.filter(function(pl) { return pl.category === 'Experience'; });
  var rests   = places.filter(function(pl) { return pl.category === 'Restaurant'; });
  var wines   = places.filter(function(pl) { return pl.category === 'Wine Estate'; });

  var stayName = stay  ? stay.name  : null;
  var carName  = car   ? car.name   : null;
  var exp1     = exps[0]  ? exps[0].name  : null;
  var exp2     = exps[1]  ? exps[1].name  : null;
  var rest1    = rests[0] ? rests[0].name : null;
  var rest2    = rests[1] ? rests[1].name : null;
  var wine1    = wines[0] ? wines[0].name : null;

  var days = [];

  // Day 1 — Arrival
  days.push({
    dayNumber: 1, label: 'Day 1', title: 'Arrival & Settle In',
    image: '/photos/waterfront.jpeg',

    days.push({
      dayNumber: 5, label: 'Day 5', title: 'Neighbourhood & Last Day',
      image: '/photos/sea-point.jpeg',

  }

  return days;
}

// ─── Remove saved place ──────────────────────────────────
function removeSavedPlace(name, sourcePage) {
  var profile = {};
  try { var raw = localStorage.getItem('ubuntuTripProfile'); if (raw) profile = JSON.parse(raw) || {}; } catch(e) {}
  if (Array.isArray(profile.savedPlaces)) {
    profile.savedPlaces = profile.savedPlaces.filter(function(p) {
      return !(p.name === name && p.sourcePage === sourcePage);
    });
    try { localStorage.setItem('ubuntuTripProfile', JSON.stringify(profile)); } catch(e) {}
  }
  // Re-render
  document.getElementById('mainContent').innerHTML = '';
  renderCockpit();
}

// ─── Reset My Trip ───────────────────────────────────────
function resetMyTrip() {
  var ok = confirm('Are you sure you want to reset your trip? This will delete your saved trip profile and saved places, but keep your guide access.');
  if (!ok) return;
  localStorage.removeItem('ubuntuTripProfile');
  location.reload();
}

// ─── Resend ──────────────────────────────────────────────
async function resendGuide() {
  var emailEl = document.getElementById('guideEmail');
  var msg = document.getElementById('resendMsg');
  if (!emailEl || !msg) return;
  var email = emailEl.value.trim();
  if (!email || !email.includes('@')) { msg.textContent = 'Please enter a valid email address.'; msg.style.color = '#ff6b6b'; return; }
  msg.textContent = 'Sending…'; msg.style.color = 'rgba(250,248,244,0.5)';
  try {
    var res = await fetch('https://caipy-sfau.onrender.com/resend-guide', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    if (res.ok) { msg.textContent = '✓ Check your inbox — guide link sent!'; msg.style.color = '#4CAF50'; }
    else { msg.textContent = 'No guide found for this email. Try the Trip Builder first.'; msg.style.color = '#ff6b6b'; }
  } catch(e) { msg.textContent = 'Something went wrong. Please try again.'; msg.style.color = '#ff6b6b'; }
}

function computeCompletion(p) {
  var score = 1; // profile exists
  var max = 6;
  var places = Array.isArray(p.savedPlaces) ? p.savedPlaces : [];
  if (places.some(function(pl) { return pl.category === 'Rental Car'; })) score++;
  if (places.some(function(pl) { return pl.category === 'Accommodation'; })) score++;
  if (places.filter(function(pl) { return pl.category === 'Experience'; }).length >= 2) score++;
  var mc = (p.costs && p.costs.manualCosts) ? p.costs.manualCosts : {};
  if (Object.keys(mc).some(function(k) { return parseFloat(mc[k]) > 0; })) score++;
  if (Array.isArray(p.generatedItinerary) && p.generatedItinerary.length > 0) score++;
  return Math.round((score / max) * 100);
}

function buildPreviewCards(p) {
  var cards = [];
  var places = Array.isArray(p.savedPlaces) ? p.savedPlaces : [];
  var usedIds = {};

  // ── 1. Build from saved places ──
  var catPriority = ['Accommodation', 'Rental Car', 'Experience', 'Experience', 'Restaurant', 'Day Trip'];
  var savedBycat = {};
  places.forEach(function(pl) {
    var cat = pl.category || 'default';
    if (!savedBycat[cat]) savedBycat[cat] = [];
    savedBycat[cat].push(pl);
  });

  // Add up to 2 experiences, 1 of each other category
  var catCounts = {};
  places.forEach(function(pl) {
    var cat = pl.category || 'default';
    var limit = cat === 'Experience' ? 2 : 1;
    catCounts[cat] = catCounts[cat] || 0;
    if (catCounts[cat] >= limit) return;
    catCounts[cat]++;
    var img = PREVIEW_IMAGES[pl.id] || PREVIEW_FALLBACKS[cat] || PREVIEW_FALLBACKS['default'];
    var emotion = PREVIEW_EMOTIONS[cat] || PREVIEW_EMOTIONS['default'];
    var detail = pl.location ? pl.location : (pl.notes ? pl.notes.slice(0, 60) : '');
    var saveItem = JSON.stringify({ name: pl.name, category: pl.category, sourcePage: pl.sourcePage || '', location: pl.location || '', notes: pl.notes || '', url: pl.url || '' });
    cards.push({
      id: pl.id || (pl.name + pl.category),
      category: cat,
      title: pl.name,
      image: img,
      description: emotion,
      detail: detail,
      primaryLabel: pl.url ? 'View →' : 'Details',
      primaryUrl: pl.url || ('#recSection'),
      secondaryLabel: 'Remove',
      secondaryAction: 'removeSavedPlace(\'' + escHtml(pl.name).replace(/'/g,"\\'") + '\',\'' + (pl.sourcePage||'').replace(/'/g,"\\'") + '\')',
      isSaved: true
    });
    usedIds[pl.name + cat] = true;
  });

  // ── 2. Fill empty slots from recommendations (max 6 total, one per category except 2 experiences) ──
  if (cards.length < 6 && p) {
    var recs = matchRecommendations(p);
    // Interleave by priority: 1 stay, 1 car, 2 experiences, 1 restaurant, 1 day trip
    var slotOrder = [
      { cat: 'Accommodation', pool: recs.placesToStay || [],        limit: 1 },
      { cat: 'Rental Car',    pool: recs.rentalCars || [],          limit: 1 },
      { cat: 'Experience',    pool: recs.experiencesToBook || [],   limit: 2 },
      { cat: 'Restaurant',    pool: recs.restaurantsToReserve || [],limit: 1 },
      { cat: 'Experience',    pool: recs.experiencesToBook || [],   limit: 2 }  // second experience slot
    ];

    var recCatCounts = {};
    slotOrder.forEach(function(slot) {
      if (cards.length >= 6) return;
      recCatCounts[slot.cat] = recCatCounts[slot.cat] || 0;
      for (var i = 0; i < slot.pool.length; i++) {
        if (cards.length >= 6) break;
        if (recCatCounts[slot.cat] >= slot.limit) break;
        var item = slot.pool[i];
        var key = item.name + item.category;
        if (usedIds[key]) continue;
        usedIds[key] = true;
        recCatCounts[slot.cat]++;
        var img = PREVIEW_IMAGES[item.id] || PREVIEW_FALLBACKS[item.category] || PREVIEW_FALLBACKS['default'];
        var emotion = item.whyItFits ? item.whyItFits.slice(0, 80) + (item.whyItFits.length > 80 ? '…' : '') : (PREVIEW_EMOTIONS[item.category] || PREVIEW_EMOTIONS['default']);
        var detail = item.estimatedPriceRange ? 'From ' + item.estimatedPriceRange : (item.area || '');
        var saveItemObj = { name: item.name, category: item.category, sourcePage: item.category === 'Restaurant' ? 'food.html' : item.category === 'Accommodation' ? 'stay.html' : item.category === 'Rental Car' ? 'carrental.html' : 'experiences.html', location: item.area || '', notes: item.whyItFits || '', url: item.bookingUrl || '' };
        cards.push({
          id: item.id,
          category: item.category,
          title: item.name,
          image: img,
          description: emotion,
          detail: detail,
          primaryLabel: item.bookingUrl ? (item.category === 'Restaurant' ? 'Reserve →' : item.category === 'Rental Car' ? 'Check Rates →' : 'Book →') : 'Learn more',
          primaryUrl: item.bookingUrl || '#recSection',
          secondaryLabel: '+ Add to My Trip',
          secondaryAction: 'addRecToTrip(\'' + JSON.stringify(saveItemObj).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') + '\', this)',
          isSaved: false
        });
        break; // one per slot iteration
      }
    });
  }

  return cards.slice(0, 6);
}

  var main = document.getElementById('mainContent');
  var raw = null;
  try { raw = localStorage.getItem('ubuntuTripProfile'); } catch(e) {}
  var p = null;
  if (raw) { try { p = JSON.parse(raw); } catch(e) {} }

  if (!p) {
    // ── NO PROFILE: elegant empty state ──
    main.innerHTML = [
      '<div class="no-profile-wrap">',
        '',
        '<h1 class="no-profile-title">Your Cape Town<br><em>Travel Cockpit</em></h1>',
        '<p class="no-profile-sub">Your personal trip plan is waiting.<br>Start the Trip Builder to create your Cape Town profile.</p>',
        '<a href="itinerary.html" class="no-profile-btn">Start the Trip Builder</a>',
        '<div class="resend-secondary" style="margin-top:64px;padding-top:40px;border-top:1px solid rgba(201,169,110,0.08);">',
          '<div class="resend-secondary-title">Need to resend your guide link?</div>',
          '<div class="resend-row">',
            '<input type="email" class="email-input" id="guideEmail" placeholder="your@email.com" />',
            '<button class="resend-btn" onclick="resendGuide()">Resend →</button>',
          '</div>',
          '<div id="resendMsg"></div>',
        '</div>',
      '</div>'
    ].join('');
    document.getElementById('guideEmail').addEventListener('keypress', function(e) { if (e.key === 'Enter') resendGuide(); });
    return;
  }

function buildRecCard(item) {
  var bookLabel = item.category === 'Restaurant' ? 'Reserve' : item.category === 'Accommodation' ? 'Check Availability' : item.category === 'Rental Car' ? 'Check Rates' : item.category === 'Wine Estate' ? 'Plan Visit' : 'Book';

  var saveItem = {
    name: item.name,
    category: item.category,
    sourcePage: item.category === 'Restaurant' ? 'food.html' : item.category === 'Accommodation' ? 'stay.html' : item.category === 'Rental Car' ? 'carrental.html' : item.category === 'Wine Estate' ? 'wine.html' : 'experiences.html',
    location: item.area || '',
    notes: item.whyItFits || '',
    url: item.bookingUrl || ''
  };
  var saveItemStr = JSON.stringify(saveItem)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

  // Image — use PREVIEW_IMAGES map, fall back to category fallback
  var imgSrc = (typeof PREVIEW_IMAGES !== 'undefined' && PREVIEW_IMAGES[item.id])
    || (typeof PREVIEW_FALLBACKS !== 'undefined' && PREVIEW_FALLBACKS[item.category])
    || '/photos/hero-aerial.jpg';
  var imgHtml = '<div class="rc-img-wrap">' +
    '<img class="rc-img" src="' + escHtml(imgSrc) + '" alt="' + escHtml(item.name) + '" loading="lazy" ' +
      'onerror="this.style.display=\'none\';this.parentElement.classList.add(\'rc-img-wrap--fallback\')">' +
    '<div class="rc-img-placeholder">' + escHtml(item.category) + '</div>' +
    '</div>';

  // Teaser: truncate whyItFits to ~100 chars
  var teaser = '';
  if (item.whyItFits) {
    teaser = item.whyItFits.length > 100 ? item.whyItFits.slice(0, 97) + '…' : item.whyItFits;
  }

  // Dirk's tip: collapsed toggle
  var tipHtml = '';
  if (item.dirkTip) {
    var tipId = 'rctip-' + escHtml(item.id || (item.name || '').replace(/\W/g,'').slice(0,10));
    tipHtml = '<div class="rc-tip">' +
      '<button class="rc-tip-toggle" onclick="(function(btn){var t=document.getElementById(\'' + tipId + '\');var open=t.style.display===\'block\';t.style.display=open?\'none\':\'block\';btn.textContent=open?\'Dirk\\\'s tip ↓\':\'Dirk\\\'s tip ↑\';})(this)">' +
        'Dirk\'s tip ↓' +
      '</button>' +
      '<div id="' + tipId + '" class="rc-tip-body" style="display:none;">' + escHtml(item.dirkTip) + '</div>' +
    '</div>';
  }

  return '<div class="rec-card">' +
    imgHtml +
    '<div class="rc-body">' +
      '<div class="rc-cat">' + escHtml(item.category) + '</div>' +
      '<div class="rc-name">' + escHtml(item.name) + '</div>' +
      (teaser ? '<div class="rc-teaser">' + escHtml(teaser) + '</div>' : '') +
      '<div class="rc-meta">' +
        (item.area ? '<span>' + escHtml(item.area) + '</span>' : '') +
        (item.estimatedPriceRange ? '<span>' + escHtml(item.estimatedPriceRange) + '</span>' : '') +
      '</div>' +
      tipHtml +
      '<div class="rc-actions">' +
        '<button class="rc-btn-primary" onclick="addRecToTrip(\'' + saveItemStr + '\', this)">+ Add to My Trip</button>' +
        (item.bookingUrl ? '<a href="' + escHtml(item.bookingUrl) + '" target="_blank" rel="noopener" class="rc-btn-secondary">' + bookLabel + ' →</a>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function addRecToTrip(itemJsonStr, btn) {
  var item;
  try { item = JSON.parse(itemJsonStr); } catch(e) { return; }
  if (typeof addToMyTrip === 'function') {
    addToMyTrip(item, btn);
  }
}

function renderRecommendations(data) {
  var section = document.getElementById('recSection');
  if (!section) return;

  var categories = [
    { id: 'rental-car-options',     label: 'Choose your ride',          sub: 'Pick the right car for your Cape Town adventure.',           carouselId: 'carousel-cars',  items: data.rentalCars },
    { id: 'places-to-stay-options', label: 'Choose your base',          sub: 'Where you sleep shapes your whole Cape Town experience.',    carouselId: 'carousel-stays', items: data.placesToStay },
    { id: 'experiences-to-prebook', label: 'Pre-book your experiences', sub: 'These sell out — add them to your trip and book early.',    carouselId: 'carousel-exp',   items: data.experiencesToBook },
    { id: 'restaurants-section',    label: 'Reserve your tables',       sub: 'The best tables in Cape Town go fast. Reserve early.',      carouselId: 'carousel-rest',  items: data.restaurantsToReserve },
    { id: 'wine-estates-section',   label: 'Choose your wine escape',   sub: 'Cape Town\'s best wine estates, tastings and long-lunch views — curated for your trip.', carouselId: 'carousel-wine', items: data.wineEstates }
  ].filter(function(c) { return Array.isArray(c.items) && c.items.length > 0; });

  if (categories.length === 0) {
    var loading = section.querySelector('#recLoading');
    if (loading) loading.innerHTML = '<div class="rec-error">We couldn\'t load recommendations yet. Your trip profile is saved — try again later.</div>';
    return;
  }

  var html = '';
  categories.forEach(function(cat) {
    html += '<div class="rec-row" id="' + cat.id + '">' +
      '<div class="rec-row-header">' +
        '<div>' +
          '<div class="rec-row-title">' + cat.label + '</div>' +
          '<div class="rec-row-sub">' + cat.sub + '</div>' +
        '</div>' +
        '<div class="rec-row-nav">' +
          '<button class="rec-nav-btn" onclick="scrollRecCarousel(\'' + cat.carouselId + '\',-1)" aria-label="Previous">←</button>' +
          '<button class="rec-nav-btn" onclick="scrollRecCarousel(\'' + cat.carouselId + '\',1)" aria-label="Next">→</button>' +
        '</div>' +
      '</div>' +
      '<div class="rec-carousel" id="' + cat.carouselId + '">' +
        cat.items.map(buildRecCard).join('') +
      '</div>' +
    '</div>';
  });

  var loading = section.querySelector('#recLoading');
  if (loading) loading.outerHTML = html;
}

// ─── Local matching engine ────────────────────────────────

function matchRecommendations(p) {
  var budget = (p.budget || '').toLowerCase();
  var budgetLevel = budget.includes('budget') ? 'budget'
    : budget.includes('luxury') ? 'luxury'
    : budget.includes('premium') ? 'premium'
    : 'mid';

  var travelWith = (p.travellingWith || '').toLowerCase();
  var bestFor = travelWith.includes('solo') ? 'solo'
    : travelWith.includes('couple') ? 'couple'
    : travelWith.includes('famil') ? 'family'
    : travelWith.includes('group') ? 'group'
    : 'couple';

  var transport = (p.transport || '').toLowerCase();
  var wantsCar = transport.includes('rental') || transport.includes('car') || transport.includes('decided') || transport.includes('mix');

  var interests = (Array.isArray(p.interests) ? p.interests.join(' ') : '').toLowerCase();
  var mustDo = (p.mustDo || '').toLowerCase();
  var avoid = (p.toAvoid || '').toLowerCase();
  var notes = (p.extraNotes || '').toLowerCase();
  var allText = interests + ' ' + mustDo + ' ' + notes;

  var stayArea = (p.stayArea || '').toLowerCase();
  var accommodation = (p.accommodation || '').toLowerCase();

  // ── Rental cars ──────────────────────────────────────────
  var cars = [];
  if (wantsCar) {
    var isAdventure = allText.includes('addo') || allText.includes('garden route') || allText.includes('4x4') || allText.includes('gravel');
    var isFamily = bestFor === 'family';

    if (isAdventure) {
      cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-4x4-adventure' || c.id === 'car-mid-suv'; });
    } else if (isFamily) {
      cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-family-suv' || c.id === 'car-mid-suv'; });
    } else if (budgetLevel === 'budget') {
      cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-budget-compact' || c.id === 'car-mid-suv'; });
    } else if (budgetLevel === 'luxury' || budgetLevel === 'premium') {
      cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-convertible' || c.id === 'car-premium-suv' || c.id === 'car-mid-suv'; });
    } else {
      cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-mid-suv' || c.id === 'car-budget-compact'; });
    }
    // always pad to 4 options, always include private driver as last resort
    RENTAL_CARS.forEach(function(c) {
      if (cars.length < 4 && !cars.find(function(x){return x.id===c.id;}) && c.id !== 'car-uber-only') cars.push(c);
    });
    cars = cars.slice(0, 4);
  } else {
    // User chose Uber/Bolt or guided tours — show no-car options
    cars = RENTAL_CARS.filter(function(c) { return c.id === 'car-uber-only' || c.id === 'car-private-driver'; });
  }

  // ── Places to stay ───────────────────────────────────────
  var scored = STAY_OPTIONS.map(function(s) {
    var score = 0;
    if (s.budgetLevel.indexOf(budgetLevel) > -1) score += 3;
    if (s.bestFor.indexOf(bestFor) > -1) score += 2;
    if (stayArea && s.area.toLowerCase().includes(stayArea.split(' ')[0])) score += 2;
    if (s.accommodation && accommodation) {
      s.accommodation.forEach(function(a) { if (accommodation.includes(a)) score += 1; });
    }
    return { item: s, score: score };
  });
  scored.sort(function(a,b) { return b.score - a.score; });
  var stays = scored.slice(0, 3).map(function(s) { return s.item; });

  // ── Experiences ──────────────────────────────────────────
  var exScored = EXPERIENCE_OPTIONS.map(function(e) {
    var score = 0;
    e.interests.forEach(function(tag) {
      if (allText.includes(tag)) score += 2;
    });
    e.tags.forEach(function(tag) {
      if (allText.includes(tag)) score += 1;
    });
    // Table Mountain is for everyone
    if (e.id === 'exp-table-mountain') score += 3;
    // Seasonal boost — whale watching Jun-Nov
    var month = new Date().getMonth();
    if (e.id === 'exp-whale-watching' && month >= 5 && month <= 10) score += 3;
    return { item: e, score: score };
  });
  exScored.sort(function(a,b) { return b.score - a.score; });
  // Remove avoided items
  var experiences = exScored.filter(function(e) {
    if (!avoid) return true;
    return !e.item.tags.some(function(t) { return avoid.includes(t); });
  }).slice(0, 5).map(function(e) { return e.item; });
  // Ensure at least Table Mountain and Cape Point if no interests
  if (experiences.length === 0) {
    experiences = EXPERIENCE_OPTIONS.slice(0, 4);
  }

  // ── Restaurants ──────────────────────────────────────────
  var wantsFood = allText.includes('food') || allText.includes('restaurant') || allText.includes('dining') || allText.includes('wine') || allText.includes('eat') || allText.includes('gastronomy') || allText.includes('seafood') || allText.includes('coffee');
  var restaurants = [];
  if (wantsFood || restaurants.length === 0) {
    var restScored = RESTAURANT_OPTIONS.map(function(r) {
      var score = 0;
      r.interests.forEach(function(tag) { if (allText.includes(tag)) score += 2; });
      r.tags.forEach(function(tag) { if (allText.includes(tag)) score += 1; });
      if (budgetLevel === 'luxury' || budgetLevel === 'premium') {
        if (r.tags.indexOf('fine-dining') > -1) score += 2;
      }
      if (budgetLevel === 'budget') {
        if (r.tags.indexOf('casual') > -1 || r.tags.indexOf('neighbourhood') > -1) score += 2;
      }
      return { item: r, score: score };
    });
    restScored.sort(function(a,b) { return b.score - a.score; });
    restaurants = restScored.slice(0, 8).map(function(r) { return r.item; });
  }

  // ── Wine estates ─────────────────────────────────────────
  var wineEstates = WINE_ESTATE_OPTIONS.slice(0, 10);

  return {
    rentalCars: cars,
    placesToStay: stays,
    experiencesToBook: experiences,
    restaurantsToReserve: restaurants,
    wineEstates: wineEstates
  };
}

function scrollRecCarousel(id, dir) {
  var el = document.getElementById(id);
  if (el) el.scrollBy({ left: dir * 300, behavior: 'smooth' });
}

function loadRecommendations() {
  var recSection = document.getElementById('recSection');
  if (!recSection) return;

  var raw;
  try { raw = localStorage.getItem('ubuntuTripProfile'); } catch(e) {}
  if (!raw) return;
  var profile;
  try { profile = JSON.parse(raw); } catch(e) { return; }
  if (!profile) return;

  var data = matchRecommendations(profile);
  var hasAny = data.rentalCars.length || data.placesToStay.length || data.experiencesToBook.length || data.restaurantsToReserve.length || data.wineEstates.length;

  if (!hasAny) {
    var loading = document.getElementById('recLoading');
    if (loading) loading.innerHTML = '<div class="rec-error">Ubuntu needs a little more trip information before recommending options. <a href="itinerary.html" style="color:var(--gold);">Edit your trip profile</a> to add budget, stay area and interests.</div>';
    return;
  }

  renderRecommendations(data);
}

renderCockpit();
loadRecommendations();
</script>
